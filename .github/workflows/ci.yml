name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CELO_RPC_URL: https://forno.celo.org

jobs:
  contracts:
    name: Foundry (fork tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      # No `forge install` step: contracts/lib/ is committed directly (see
      # ../../.gitignore) rather than installed as submodules, so it's already
      # present right after checkout.
      - name: Build
        run: forge build

      - name: Test (against live Celo mainnet fork)
        run: forge test -vv

  agent:
    name: Agent typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: agent/package-lock.json

      - run: npm ci
      - run: npx tsc --noEmit

  frontend:
    name: Frontend build + lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # `npm ci` fails here (works locally on macOS, fails on the Ubuntu
      # runner) — looks like a platform-specific optional-dependency
      # resolution mismatch in this stack (Tailwind v4/lightningcss + several
      # wallet connectors all ship native platform binaries as optional
      # deps). `npm install` re-resolves at install time instead of trusting
      # the lockfile's platform snapshot, which sidesteps it.
      - run: npm install
      - run: npm run lint
      - run: npm run build

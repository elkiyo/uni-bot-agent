name: Keeper tick (manual backup)

# The real 5-minute trigger is an external cron-job.org job hitting
# /api/cron/tick directly — see SCALING.md. GitHub Actions' own `schedule`
# trigger was tried first but proved unreliable on this repo: confirmed via
# `gh run list` that a `*/5 * * * *` schedule actually fired only ~7 times in
# 10+ hours (roughly every 1.5-2h instead of every 5 min), which is GitHub's
# documented best-effort throttling on low-traffic repos, not a bug in this
# workflow. Kept here as a manual (workflow_dispatch-only) way to force a tick
# from the Actions tab without needing cron-job.org access.
on:
  workflow_dispatch: {}

concurrency:
  group: keeper-tick
  cancel-in-progress: false

jobs:
  tick:
    runs-on: ubuntu-latest
    steps:
      - name: POST /api/cron/tick
        run: |
          status=$(curl -s -o /tmp/response.json -w "%{http_code}" -X POST \
            "https://uni-bot-agent-gules.vercel.app/api/cron/tick" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")
          echo "HTTP $status"
          cat /tmp/response.json
          if [ "$status" -ge 300 ]; then
            exit 1
          fi
